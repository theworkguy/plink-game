<script type='text/javascript'>
// ============================================================
// OFFLINE PLINKO - All API handled by serve.py (localhost:8080)
// Client-side: only block WebSocket, sendBeacon, analytics
// ============================================================

// --- BLOCK WebSocket (no WS server) ---
window.WebSocket = function(url) {
    console.log('[OFFLINE] Blocked WebSocket:', url);
    return {
        readyState: 1, OPEN: 1, CLOSED: 3,
        send: function() {},
        close: function() { this.readyState = 3; },
        addEventListener: function(ev, cb) { if (ev === 'open') setTimeout(cb, 0); },
        removeEventListener: function() {},
        dispatchEvent: function() {},
        onopen: null, onclose: null, onmessage: null, onerror: null
    };
};
window.WebSocket.OPEN = 1;
window.WebSocket.CLOSED = 3;

// --- BLOCK sendBeacon ---
navigator.sendBeacon = function() { return true; };

// --- BLOCK onbeforeunload beacon ---
window.onbeforeunload = function() {};

// --- BLOCK analytics/lobby/drops in fetch ---
const _origFetch = window.fetch;
window.fetch = function(url, opts) {
    const u = typeof url === 'string' ? url : (url && url.url) || '';
    if (/cable|lobby|drops|replays|boost2|amplitude|googletagmanager|gtag|bgaming-system|challenges|quests/i.test(u)) {
        return Promise.resolve(new Response('{}', { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    return _origFetch.apply(this, arguments);
};

// --- BLOCK analytics/lobby/drops in XHR ---
const _XHROpen = XMLHttpRequest.prototype.open;
const _XHRSend = XMLHttpRequest.prototype.send;
XMLHttpRequest.prototype.open = function(method, url) {
    this._url = url;
    return _XHROpen.apply(this, arguments);
};
XMLHttpRequest.prototype.send = function(data) {
    if (this._url && /cable|lobby|drops|replays|boost2|amplitude|googletagmanager|gtag|bgaming-system|challenges|quests/i.test(this._url)) {
        return;
    }
    return _XHRSend.apply(this, arguments);
};

// --- CONFIGURE window.__OPTIONS__ (serve.py handles all API calls) ---
window.__OPTIONS__ = {
    "env": "production",
    "csrfTokenHeaderName": "X-CSRF-Token",
    "csrfTokenHeaderValue": "offline-token",
    "play_token": "offline-local-play",

    "ui": {

        "brand_logo": null,

        "autospins_dialog": "standard",
        "autospin_values": ["10","25","50","100","250","500","750","1000","\u221e"],
        "gamble_enabled": true,

    },
    "resources_path": "/assets",
    "custom": {},
    "actual_currency_rate": 0.0,
    "sound_enabled": true,
    "games_loader_source": "/loader.js",
    "game_bundle_source": "/assets/basic/v0.0.57_v14.16.3/bundle.js",
    "provable_fair": {"verify_url": "/api/games/verify"},
    "math": {"rtp":{"main":98.91,"min_rtp":98.91,"max_rtp":99.16},"max_multiplier":1000.0},
    "rules": {"min_bet":100,"max_bet":10000,"currency":{"code":"FUN","symbol":"FUN","subunits":100,"exponent":2}},
    "version": "1.0.0",
    "growthbook_flags": {"tech_lobby_widget_position":{"value":{"desktop":"bottom","portrait":"top","landscape":"top"},"variation_id":"forced","experiment_key":null}},
    "lobby_v2_options": {
